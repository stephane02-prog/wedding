  .hero>*{position:relative;z-index:1}
  .hero .mono{font-family:'Cormorant Garamond',serif;font-weight:400;
    font-size:34px;letter-spacing:.34em;padding-left:.34em}
  .hero .big{font-family:'Allura',cursive;font-size:clamp(64px,20vw,118px);
    line-height:.9;font-weight:400;text-shadow:0 2px 30px rgba(0,0,0,.5)}
  .hero .big small{display:block;font-size:.42em;margin-bottom:-.1em}
  .hero .d{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,8vw,40px);
    letter-spacing:.3em;padding-left:.3em}

  /* ---------- shared section ---------- */
  section{padding:62px 24px}
  .inner{max-width:480px;margin:0 auto}
  .eyebrow{text-align:center;font-size:11px;letter-spacing:.4em;color:var(--muted);
    text-transform:uppercase;margin-bottom:30px}
  .rule{height:1px;width:46px;background:var(--line);margin:30px auto}

  /* ---------- details ---------- */
  .families{display:flex;gap:18px;justify-content:center;text-align:center;
    font-size:12.5px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;line-height:1.9}
  .families .amp{font-family:'Cormorant Garamond',serif;font-size:26px;
    color:var(--ink);text-transform:none;align-self:center}
  .couple{text-align:center;margin:30px 0 6px}
  .couple .n{font-family:'Allura',cursive;font-size:clamp(32px,9vw,46px);line-height:1.1}
  .couple .and{font-size:13px;letter-spacing:.3em;color:var(--muted);
    text-transform:uppercase;margin:6px 0}
  .invite-line{text-align:center;font-family:'Cormorant Garamond',serif;
    font-weight:400;font-size:25px;letter-spacing:.14em;line-height:1.5;margin:34px 0}
  .events{display:flex;flex-direction:column;gap:26px;margin-top:8px}
  .event{text-align:center}
  .event .time{font-family:'Cormorant Garamond',serif;font-size:24px;letter-spacing:.24em;padding-left:.24em}
  .event .what{font-size:11px;letter-spacing:.34em;color:var(--gold);text-transform:uppercase;margin:9px 0 7px}
  .event .where{font-size:13.5px;letter-spacing:.04em;color:var(--muted);line-height:1.6}
  .event .where a{text-decoration:underline;text-underline-offset:3px;text-decoration-color:var(--line)}
  .dress{text-align:center;font-size:12.5px;letter-spacing:.16em;color:var(--muted);
    text-transform:uppercase;margin-top:36px}
  .verse{text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:17px;line-height:1.7;color:var(--muted);margin-top:36px}
  .verse .ref{display:block;font-style:normal;font-size:11px;letter-spacing:.24em;
    text-transform:uppercase;margin-top:14px;color:#8c7e7a}

  /* ---------- RSVP ---------- */
  #rsvp{background:#281F1F;border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft)}
  h2.rsvp{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:42px;
    letter-spacing:.26em;text-align:center;padding-left:.26em}
  .lead{text-align:center;color:var(--muted);font-size:13.5px;margin-top:14px;line-height:1.7}
  .deadline{display:block;text-align:center;margin:24px auto 6px;border:1px solid var(--gold);
    border-radius:5px;padding:12px 14px;font-size:11.5px;letter-spacing:.18em;
    text-transform:uppercase;max-width:300px}
  form{margin-top:30px}
  .field{margin-bottom:20px}
  label{display:block;font-size:11px;letter-spacing:.22em;color:var(--muted);
    text-transform:uppercase;margin-bottom:9px}
  label .opt{text-transform:none;letter-spacing:0;color:#8c7e7a}
  input[type=text],textarea{width:100%;background:var(--field);border:1px solid var(--line-soft);
    border-radius:5px;color:var(--ink);font-family:'Jost',sans-serif;font-weight:300;
    font-size:16px;padding:13px 14px;transition:border-color .2s}
  textarea{resize:vertical;min-height:74px;line-height:1.5}
  input::placeholder,textarea::placeholder{color:#7d6f6c}
  input:focus,textarea:focus{outline:none;border-color:var(--gold)}
  .pills{display:flex;gap:12px}
  .pill{flex:1;background:var(--field);border:1px solid var(--line-soft);border-radius:5px;
    padding:14px 10px;text-align:center;cursor:pointer;font-size:12.5px;letter-spacing:.08em;
    color:var(--muted);text-transform:uppercase;transition:.2s}
  .pill:hover{border-color:var(--line)}
  .pill[aria-pressed=true]{border-color:var(--gold);color:var(--ink);background:#2c2220}
  .pill:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  button.send{width:100%;margin-top:8px;background:var(--ink);color:#241c1c;border:none;
    border-radius:5px;padding:15px;font-family:'Jost',sans-serif;font-size:13px;
    letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:.2s}
  button.send:hover{background:#fff}
  button.send:disabled{opacity:.45;cursor:default}
  button.send:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
  .err{color:#e6a98f;font-size:12.5px;margin-top:6px;min-height:1px}

  .thanks{text-align:center;padding:14px 4px}
  .check{width:54px;height:54px;border:1px solid var(--gold);border-radius:50%;margin:0 auto 22px;
    display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:26px}
  .thanks h3{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:30px;margin-bottom:14px}
  .thanks p{color:var(--muted);font-size:14px;line-height:1.7}
  .linkbtn{background:none;border:none;color:var(--muted);font-family:'Jost',sans-serif;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;margin-top:24px;
    text-decoration:underline;text-underline-offset:4px}
  .linkbtn:hover{color:var(--ink)}

  footer{text-align:center;padding:40px 20px 44px}
  footer .contact{margin-bottom:30px}
  footer .ctitle{font-size:10px;letter-spacing:.34em;text-transform:uppercase;color:#8c7e7a;margin-bottom:12px}
  footer .cname{font-family:'Cormorant Garamond',serif;font-size:22px;letter-spacing:.04em;color:var(--ink)}
  footer .cnum{display:inline-block;margin-top:6px;font-size:15px;letter-spacing:.12em;
    color:var(--gold);text-decoration:none}
  footer .cnum:hover{text-decoration:underline;text-underline-offset:4px}
  footer .crule{height:1px;width:40px;background:var(--line);margin:28px auto 0}
  footer .mono{font-family:'Cormorant Garamond',serif;font-size:20px;letter-spacing:.3em;
    padding-left:.3em;color:var(--muted)}
  footer .hostlink{margin-top:20px}
  footer .hostlink a{font-size:10px;letter-spacing:.28em;text-transform:uppercase;
    color:#6f615e;text-decoration:none}
  footer .hostlink a:hover{color:var(--muted)}

  /* ---------- host ---------- */
  .host-wrap{max-width:480px;margin:0 auto;padding:54px 24px 60px}
  .summary{display:flex;gap:10px;margin:22px 0 24px}
  .stat{flex:1;background:var(--field);border:1px solid var(--line-soft);border-radius:6px;
    padding:16px 8px;text-align:center}
  .stat b{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:30px;display:block;line-height:1}
  .stat span{font-size:10px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;display:block;margin-top:8px}
  .hostbar{display:flex;justify-content:space-between;gap:10px}
  .barbtn{background:none;border:1px solid var(--line-soft);border-radius:5px;color:var(--muted);
    font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    padding:9px 14px;cursor:pointer}
  .barbtn:hover{border-color:var(--line);color:var(--ink)}
  .card{background:var(--field);border:1px solid var(--line-soft);border-radius:6px;
    padding:16px;margin-bottom:12px}
  .card .names{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:500}
  .badge{display:inline-block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;
    padding:4px 9px;border-radius:20px;margin-top:8px}
  .badge.yes{color:#241c1c;background:var(--gold)}
  .badge.no{color:var(--muted);border:1px solid var(--line)}
  .card .note{color:var(--muted);font-size:13.5px;font-style:italic;margin-top:11px;line-height:1.55}
  .card .when{color:#7d6f6c;font-size:10.5px;letter-spacing:.06em;margin-top:11px}
  .empty{text-align:center;color:var(--muted);font-size:13.5px;padding:30px 10px;line-height:1.7}
</style>
</head>
<body>
<div id="app"></div>

<script>
  
const FORM_ENDPOINT = "https://formspree.io/f/xbdvjkpq";
const app = document.getElementById("app");
const esc = s => (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const MAPS = q => "https://maps.google.com/?q=" + encodeURIComponent(q);
const REPLIED_KEY = "cs_rsvp_done";
const hasReplied = ()=>{ try{ return localStorage.getItem(REPLIED_KEY)==="1"; }catch(_){ return false; } };
const markReplied = ()=>{ try{ localStorage.setItem(REPLIED_KEY,"1"); }catch(_){} };
// RSVP closes at the end of 8 July 2026, Swedish time (CEST = UTC+2)
const DEADLINE = new Date("2026-07-08T23:59:59+02:00");
const isClosed = ()=> new Date() > DEADLINE;

/* ---------------- Invitation + RSVP ---------------- */
function renderMain(){
  app.className = "fade";
  app.innerHTML = `
  <header class="hero">
    <div class="mono">C &amp; S</div>
    <div class="big script"><small>The</small>Wedding</div>
    <div class="d">2026.08.08</div>
  </header>

  <section>
    <div class="inner">
      <div class="eyebrow">With our families</div>
      <div class="families">
        <div>Guillaume Nitunga<br>Languide Ndayishimiye</div>
        <div class="amp serif">&amp;</div>
        <div>Eric Manirakiza<br>Laetitia Nzitonda</div>
      </div>
      <div class="couple">
        <div class="n script">Chris-Claret Migisha</div>
        <div class="and">and</div>
        <div class="n script">Santiana Irakoze</div>
      </div>
      <p class="invite-line">We invite you to join us<br>to celebrate our wedding</p>
      <div class="rule"></div>
      <div class="events">
        <div class="event">
          <div class="time">2:00 PM</div>
          <div class="what">Church</div>
          <div class="where"><a href="${MAPS('Slottsgränd 7, 753 09 Uppsala')}" target="_blank" rel="noopener">Slottsgränd 7, 753 09 Uppsala</a></div>
        </div>
        <div class="event">
          <div class="time">5:00 PM</div>
          <div class="what">Reception</div>
          <div class="where"><a href="${MAPS('Johanneslundsvägen 3, 194 61 Upplands Väsby')}" target="_blank" rel="noopener">Johanneslundsvägen 3,<br>194 61 Upplands Väsby</a></div>
        </div>
      </div>
      <div class="dress">Dress code · Summer colors and proper outfit</div>
      <p class="verse serif">“Celui qui trouve une femme trouve le bonheur ; c’est une grâce qu’il obtient de l’Éternel.”
        <span class="ref">Proverbes 18:22</span></p>
    </div>
  </section>

  <section id="rsvp"><div class="inner" id="rsvpInner">${isClosed()?closedHTML():(hasReplied()?confirmedHTML():formHTML())}</div></section>

  <footer>
    <div class="contact">
      <div class="ctitle">Questions? Contact</div>
      <div class="cname">Ori-Thevenin</div>
      <a class="cnum" href="tel:+46734940945">+46 73-494 09 45</a>
      <div class="crule"></div>
    </div>
    <div class="mono">C &amp; S</div>
  </footer>`;
  if(!isClosed() && !hasReplied()) wireForm();
}

function formHTML(){
  return `
    <h2 class="rsvp">RSVP</h2>
    <p class="lead">Please add your name below to confirm you'll be there.</p>
    <div class="deadline">Please respond by 8 July 2026</div>
    <form id="f" novalidate>
      <div class="field">
        <label for="g1">Your name</label>
        <input type="text" id="g1" autocomplete="name" placeholder="First and last name" />
      </div>
      <div class="field">
        <label for="g2">Second guest <span class="opt">(optional)</span></label>
        <input type="text" id="g2" placeholder="Partner or plus-one" />
      </div>
      <div class="field">
        <label for="msg">A note for the couple <span class="opt">(optional)</span></label>
        <textarea id="msg" placeholder="Anything you'd like to say"></textarea>
      </div>
      <div class="err" id="err" role="alert"></div>
      <button type="submit" class="send" id="send">Send RSVP</button>
    </form>`;
}

function wireForm(){
  document.getElementById("f").addEventListener("submit", submit);
}

async function submit(e){
  e.preventDefault();
  if(isClosed()){ showClosed(); return; }
  const g1=document.getElementById("g1").value.trim();
  const g2=document.getElementById("g2").value.trim();
  const msg=document.getElementById("msg").value.trim();
  const err=document.getElementById("err");
  if(!g1){err.textContent="Please add your name.";document.getElementById("g1").focus();return;}
  const btn=document.getElementById("send"); btn.disabled=true; btn.textContent="Sending…";
  try{
    const res=await fetch(FORM_ENDPOINT,{
      method:"POST",
      headers:{"Accept":"application/json","Content-Type":"application/json"},
      body:JSON.stringify({
        name:g1,
        second_guest:g2||"—",
        note:msg||"—",
        _subject:"Wedding RSVP — "+g1+(g2?" & "+g2:"")
      })
    });
    if(!res.ok) throw new Error("bad");
    markReplied();
    showConfirmed();
  }catch(ex){
    btn.disabled=false; btn.textContent="Send RSVP";
    err.textContent="Something went wrong sending that. Please check your connection and try again.";
  }
}

function confirmedHTML(){
  return `<div class="thanks fade">
      <div class="check">&#10003;</div>
      <h3 class="serif">MURAHAWE IKAZE</h3>
    </div>`;
}

function closedHTML(){
  return `<div class="thanks fade">
      <div class="check">&#9825;</div>
      <h3 class="serif">RSVP is now closed</h3>
      <p>The deadline to reply was 8 July 2026.<br>If you still need to reach us, please contact Ori-Thevenin below.</p>
    </div>`;
}

function showClosed(){
  document.getElementById("rsvpInner").innerHTML = closedHTML();
  document.getElementById("rsvp").scrollIntoView({behavior:"smooth"});
}

function showConfirmed(){
  document.getElementById("rsvpInner").innerHTML = confirmedHTML();
  document.getElementById("rsvp").scrollIntoView({behavior:"smooth"});
}

renderMain();
</script>
</body>
</html>
